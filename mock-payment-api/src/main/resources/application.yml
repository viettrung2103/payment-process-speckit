server:
  port: 8081

spring:
  application:
    name: mock-payment-api
  datasource:
    url: jdbc:h2:mem:mockdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.payment.mock: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Default configuration
mock:
  payment:
    failure-rate: 0.1
    delay:
      min: 1
      max: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
    rabbit:
      enabled: false
