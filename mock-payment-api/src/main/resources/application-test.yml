server:
  port: 0

spring:
  application:
    name: mock-payment-api-test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

logging:
  level:
    root: WARN

# Test-specific configuration
mock:
  payment:
    failure-rate: 0.1
    delay:
      min: 1
      max: 100
