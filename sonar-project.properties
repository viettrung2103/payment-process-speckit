# SonarQube Configuration for Payment System Speckit
sonar.projectKey=payment-system-speckit
sonar.projectName=Payment System Speckit
sonar.projectVersion=1.0.0

# Source code
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Language
sonar.language=java

# Java version
sonar.java.source=21
sonar.java.target=21

# Coverage
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Exclusions
sonar.exclusions=**/generated/**,**/target/**

# Test inclusions
sonar.test.inclusions=**/*Test.java,**/*Tests.java,**/*TestCase.java

# Code quality rules
sonar.qualitygate.wait=true