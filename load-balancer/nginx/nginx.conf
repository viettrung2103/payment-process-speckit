# Payment System Load Balancer - Nginx Configuration
# Features: Rate Limiting, Load Balancing, Auto-Scaling Integration

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /tmp/nginx.pid;

# Load Lua modules for advanced logic (commented out for now)
# lua_package_path "/etc/nginx/lua/?.lua;;";
# lua_shared_dict rate_limit_store 10m;
# lua_shared_dict upstream_store 1m;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml;

    # Rate limiting zones
    # API endpoints: 10 requests/second
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_burst:10m rate=20r/s;

    # Payment endpoints: 5 requests/second (more restrictive)
    limit_req_zone $binary_remote_addr zone=payments:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=payments_burst:10m rate=10r/s;

    # Health check endpoints: unlimited
    limit_req_zone $binary_remote_addr zone=health:10m rate=1000r/s;

    # Upstream server configuration (dynamically managed)
    upstream payment_bridge_backend {
        # Dynamic upstream configuration managed by auto-scaler
        # Default single instance - updated by management scripts
        server payment-bridge:8080 max_fails=3 fail_timeout=30s;

        # Load balancing method
        least_conn;

        # Health checks (removed - nginx-plus only)
        # health_check interval=5s fails=2 passes=2 uri=/actuator/health;
    }

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Custom headers for tracking
    add_header X-Load-Balancer "payment-system-lb";
    add_header X-Request-ID $request_id;

    server {
        listen 80;
        server_name localhost;

        # Rate limiting for API endpoints
        location /api/v1/status {
            limit_req zone=health burst=100 nodelay;
            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Payment endpoints with stricter rate limiting
        location /api/v1/payments {
            limit_req zone=payments burst=5 nodelay;
            limit_req zone=payments_burst burst=10 nodelay;

            # Custom error pages for rate limiting
            error_page 429 = @rate_limit_exceeded;

            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Client-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings for payment requests
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Health check endpoints
        location /actuator/health {
            limit_req zone=health burst=1000 nodelay;
            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off; # Reduce log noise for health checks
        }

        # Metrics endpoints
        location /actuator/metrics {
            allow 10.0.0.0/8;  # Restrict to internal network
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Queue metrics (Phase 2 feature)
        location /api/v1/queue/metrics {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # DLQ management endpoints
        location /api/v1/dlq {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Static resources (if any)
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Default deny for unknown paths
        location / {
            return 404 '{"error": "Not Found", "message": "Endpoint not found"}';
        }

        # Rate limit exceeded error page
        location @rate_limit_exceeded {
            default_type application/json;
            return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded. Please try again later.", "retry_after": 60}';
            add_header Retry-After 60;
            add_header X-Rate-Limit-Reset $request_time;
        }
    }

    # Monitoring server (separate port for internal monitoring)
    server {
        listen 8081;
        server_name localhost;

        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            allow ::1;
            deny all;
            access_log off;
        }

        location /metrics {
            # content_by_lua_block {
            #     local metrics = require "metrics"
            #     metrics.collect()
            # }
            return 200 '{"status": "metrics endpoint disabled - Lua not available"}';
            allow 127.0.0.1;
            allow ::1;
            deny all;
        }
    }
}

