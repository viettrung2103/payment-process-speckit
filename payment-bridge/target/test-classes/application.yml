spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=JSONB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  rabbitmq:
    listener:
      simple:
        auto-startup: false
    admin:
      auto-startup: false
  main:
    banner-mode: off
logging:
  level:
    root: INFO
payment:
  api:
    base-url: http://localhost:8081
