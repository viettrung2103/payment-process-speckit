spring:
  application:
    name: payment-bridge
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=JSONB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false
  h2:
    console:
      enabled: true
payment:
  api:
    base-url: http://localhost:8081
logging:
  level:
    com.payment.bridge: DEBUG
    org.springframework.web: DEBUG
