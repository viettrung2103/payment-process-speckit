spring:
  application:
    name: payment-bridge
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_bridge
    username: payment_user
    password: payment_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
logging:
  level:
    root: INFO
    com.payment.bridge: DEBUG

payment:
  api:
    base-url: http://localhost:8081
    timeout:
      connect: 5000
      read: 2000
    retry:
      max-attempts: 5
      backoff-multiplier: 1.5
      initial-interval-ms: 500
