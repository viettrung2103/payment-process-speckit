name: Integration Tests

on:
  push:
    branches: [main, develop, "001-*"]
  pull_request:
    branches: [main, develop]

jobs:
  payment-bridge-integration:
    name: Payment Bridge Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"
          cache: maven

      - name: Run Payment Bridge Integration Tests
        run: |
          mvn clean verify \
            -B \
            --no-transfer-progress \
            -pl payment-bridge \
            -Dtest="*IntegrationTest,*ContractTest"
        env:
          MAVEN_OPTS: "-Xmx2g"

      - name: Archive Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payment-bridge-integration-results
          path: payment-bridge/target/
          retention-days: 7

  mock-payment-api-integration:
    name: Mock Payment API Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"
          cache: maven

      - name: Run Mock Payment API Integration Tests
        run: |
          mvn clean verify \
            -B \
            --no-transfer-progress \
            -Dtest="*IntegrationTest,*ContractTest" \
            -pl mock-payment-api
        env:
          MAVEN_OPTS: "-Xmx2g"

      - name: Archive Integration Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-payment-api-integration-results
          path: mock-payment-api/target/
          retention-days: 7

  load-tests:
    name: Load & Performance Tests (Dynamic Scaling - Up to 3 instances)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    strategy:
      matrix:
        instance-count: [1, 3] # Test with 1 and 3 instances (dynamic)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "zulu"
          cache: maven

      - name: Configure Dynamic Instance Count
        run: |
          echo "TEST_INSTANCES=${{ matrix.instance-count }}" >> $GITHUB_ENV
          echo "🚀 Configured to test with ${{ matrix.instance-count }} instances (max: ${{ env.MAX_INSTANCES }})"

      - name: Run Load Tests
        run: |
          mvn clean test \
            -B \
            --no-transfer-progress \
            -pl mock-payment-api \
            -Dtest=*LoadTest,*FailureDistributionStatTest
        env:
          MAVEN_OPTS: "-Xmx2g"
          TEST_INSTANCES: ${{ matrix.instance-count }}
        timeout-minutes: 45

      - name: Upload Load Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results-${{ matrix.instance-count }}-instances
          path: mock-payment-api/target/surefire-reports/
          retention-days: 7

  load-balancer-docker-build:
    name: Validate Load Balancer Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Load Balancer Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./load-balancer
          file: ./load-balancer/Dockerfile
          push: false
          tags: payment-system-nginx:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate Load Balancer Configuration
        run: |
          echo "🔍 Validating load balancer component..."
          echo "✅ Nginx configuration file present"
          [ -f "load-balancer/nginx/nginx.conf" ] || exit 1
          echo "✅ Load balancer scripts present"
          [ -f "load-balancer/scripts/health-check.sh" ] || exit 1
          [ -f "load-balancer/scripts/manage-load-balancer.sh" ] || exit 1
          [ -f "load-balancer/scripts/update-upstream.sh" ] || exit 1
          echo "✅ All load balancer components validated"
