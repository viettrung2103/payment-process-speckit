services:
  postgres:
    platform: linux/arm64
    image: postgres:15
    container_name: payment-system-postgres
    environment:
      POSTGRES_DB: payment_bridge
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "payment_user", "-d", "payment_bridge"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  rabbitmq:
    platform: linux/arm64
    image: rabbitmq:3-management
    container_name: payment-system-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  mock-payment-api:
    platform: linux/arm64
    build:
      context: ../..
      dockerfile: mock-payment-api/Dockerfile
    container_name: mock-payment-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:mockdb;DB_CLOSE_DELAY=-1
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Load Balancer
  nginx:
    platform: linux/arm64
    build:
      context: ../..
      dockerfile: load-balancer/Dockerfile
    container_name: payment-system-nginx
    ports:
      - "8080:80"
      - "8082:8082"
    environment:
      - NGINX_WORKER_PROCESSES=auto
      - NGINX_WORKER_CONNECTIONS=1024
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      payment-bridge-1:
        condition: service_healthy
      payment-bridge-2:
        condition: service_healthy
      payment-bridge-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # Payment Bridge Instances (Scaled to 3)
  payment-bridge-1:
    platform: linux/arm64
    build:
      context: ../..
      dockerfile: payment-bridge/Dockerfile
    image: config-payment-bridge:latest
    container_name: payment-bridge-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_bridge
      SPRING_DATASOURCE_USERNAME: payment_user
      SPRING_DATASOURCE_PASSWORD: payment_pass
      PAYMENT_API_BASE_URL: http://mock-payment-api:8081
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
      SERVER_PORT: 8080
      INSTANCE_ID: payment-bridge-1
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mock-payment-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  payment-bridge-2:
    platform: linux/arm64
    image: config-payment-bridge:latest
    container_name: payment-bridge-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_bridge
      SPRING_DATASOURCE_USERNAME: payment_user
      SPRING_DATASOURCE_PASSWORD: payment_pass
      PAYMENT_API_BASE_URL: http://mock-payment-api:8081
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
      SERVER_PORT: 8080
      INSTANCE_ID: payment-bridge-2
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mock-payment-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  payment-bridge-3:
    platform: linux/arm64
    image: config-payment-bridge:latest
    container_name: payment-bridge-3
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/payment_bridge
      SPRING_DATASOURCE_USERNAME: payment_user
      SPRING_DATASOURCE_PASSWORD: payment_pass
      PAYMENT_API_BASE_URL: http://mock-payment-api:8081
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
      SERVER_PORT: 8080
      INSTANCE_ID: payment-bridge-3
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mock-payment-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

volumes:
  postgres-data:
  nginx-logs:
