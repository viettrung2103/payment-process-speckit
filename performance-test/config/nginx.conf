pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Rate limiting zones - different limits for different scenarios
    # Zone for general API requests (per IP)
    # For performance testing: set very high or disable
    limit_req_zone $binary_remote_addr zone=api:10m rate=10000r/s;

    # Zone for payment creation (stricter limits)
    # For performance testing: set very high or disable
    limit_req_zone $binary_remote_addr zone=payments:10m rate=10000r/s;

    # Zone for health checks (higher limits, no restrictions)
    limit_req_zone $binary_remote_addr zone=health:10m rate=100000r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    # Burst handling and delay configuration
    limit_req_status 429;
    limit_req_log_level warn;

upstream payment_bridge_backend {
        # Match the container_names in your docker-compose.scaled.yml
        server payment-bridge-1:8080 max_fails=3 fail_timeout=30s;
        server payment-bridge-2:8080 max_fails=3 fail_timeout=30s;
        server payment-bridge-3:8080 max_fails=3 fail_timeout=30s;

        least_conn; # Enterprise standard for balanced load
    }

    server {
        listen 80;
        server_name localhost;

        # Connection limits (max 10 concurrent per IP)
        limit_conn conn_limit_per_ip 10;

        # Enable access logging for performance analysis
        access_log /var/log/nginx/access.log;

        # Health check endpoint - no rate limiting
        location /actuator/health {
            limit_req zone=health burst=100 nodelay;
            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # Payment creation endpoint - strict rate limiting
        location /api/v1/payments {
            # Allow bursts up to 50 requests, then delay
            limit_req zone=payments burst=50 nodelay;

            # Custom error page for rate limiting
            error_page 429 = @rate_limited;

            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings for performance testing
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Other API endpoints - moderate rate limiting
        location /api/v1/ {
            # Allow bursts up to 20 requests, then delay
            limit_req zone=api burst=20 nodelay;

            # Custom error page for rate limiting
            error_page 429 = @rate_limited;

            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings for performance testing
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        # Rate limiting error response
        location @rate_limited {
            default_type application/json;
            return 429 '{"error": "Too Many Requests", "message": "Rate limit exceeded. Please try again later.", "retry_after": 60}';
            add_header Retry-After 60;
            # access_log /var/log/nginx/rate_limit.log;  # Removed - permission issues
        }

        # Metrics endpoint (if needed)

        location /actuator/metrics {
            proxy_pass http://payment_bridge_backend;
            proxy_set_header Host $host;
        }

        # Default response for unmatched requests
        location / {
            return 404 '{"error": "Not Found", "message": "Endpoint not found"}';
            add_header Content-Type application/json;
        }
    }

    # Nginx status server (for health checks)
    server {
        listen 8082;
        server_name localhost;

        # Status endpoint
        location /nginx_status {
            stub_status on;
            access_log off;
            allow all;
        }

        # Simple health check endpoint
        location /health {
            access_log off;
            return 200 '{"status": "healthy"}';
            add_header Content-Type application/json;
        }

        # Deny all other requests
        location / {
            return 404;
        }
    }
}