# JMeter Configuration for Payment System Performance Testing
# This file contains default properties for JMeter test execution

# Test Plan Defaults
jmeter.save.saveservice.output_format=csv
jmeter.save.saveservice.assertion_results_failure_message=true
jmeter.save.saveservice.assertion_results=all
jmeter.save.saveservice.data_type=true
jmeter.save.saveservice.label=true
jmeter.save.saveservice.latency=true
jmeter.save.saveservice.response_code=true
jmeter.save.saveservice.response_data=false
jmeter.save.saveservice.response_data.on_error=false
jmeter.save.saveservice.response_message=true
jmeter.save.saveservice.successful=true
jmeter.save.saveservice.thread_name=true
jmeter.save.saveservice.time=true
jmeter.save.saveservice.timestamp=true
jmeter.save.saveservice.sent_bytes=true
jmeter.save.saveservice.url=true
jmeter.save.saveservice.requestheaders=false
jmeter.save.saveservice.responseheaders=false
jmeter.save.saveservice.samplerData=false
jmeter.save.saveservice.subresults=true

# HTTP Request Defaults
httpclient4.request_sent_retry_enabled=true
httpclient4.request_sent_retry_count=1
httpclient4.time_to_live=60000
httpclient4.validate_after_inactivity=2000

# Thread Group Configuration
threadgroup.delay=0
threadgroup.duration=300
threadgroup.scheduler=true

# CSV Output Configuration
csvread.delimiter=,
csvread.recycle=true
csvread.sharemode=all

# Performance Testing Specific
# Increase timeouts for load testing
httpclient4.connect_timeout=10000
httpclient4.socket_timeout=30000

# Disable unnecessary logging during tests
jmeterengine.force.system.exit=true
jmeterengine.remote.system.exit=true
jmeterengine.stopfail.system.exit=true

# Memory and performance settings
java.awt.headless=true
jmeterengine.nongui.port=4445
jmeterengine.nongui.maxport=4455

# Summariser configuration
summariser.name=summary
summariser.interval=30
summariser.log=true
summariser.out=true